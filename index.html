<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Dashboard Final</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div id="chart" style="width: 100%; height: 500px;"></div>

    <script>
        window.addEventListener('load', () => {
            try {
                // Forzamos la creación del objeto
                const chart = LightweightCharts.createChart(document.getElementById('chart'), {
                    width: 800,
                    height: 500
                });

                // Diagnóstico profundo: buscamos la función en todo el prototipo del objeto
                const proto = Object.getPrototypeOf(chart);
                const hasMethod = typeof chart.addCandlestickSeries === 'function';

                if (hasMethod) {
                    const candleSeries = chart.addCandlestickSeries();
                    candleSeries.setData([
                        { time: '2026-06-10', open: 2340, high: 2350, low: 2330, close: 2345 },
                        { time: '2026-06-11', open: 2345, high: 2360, low: 2340, close: 2355 }
                    ]);
                } else {
                    document.body.innerHTML = "<h1>Error: La API de TradingView no es compatible en este navegador.</h1>";
                    console.log("Prototipo del objeto chart:", Object.getOwnPropertyNames(proto));
                }
            } catch (err) {
                document.body.innerHTML = "<h1>Error crítico: " + err.message + "</h1>";
            }
        });
    </script>
</body>
</html>
</html>
