<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Dashboard - Modo Seguro</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #0c0d14; color: #fff; font-family: sans-serif; display: flex; padding: 20px; }
        #chart { width: 70%; height: 500px; }
        #panel { width: 30%; padding: 20px; border-left: 1px solid #333; }
    </style>
</head>
<body>

    <div id="chart"></div>
    <div id="panel">
        <h2>Estado del Sistema</h2>
        <div id="status" style="color: #00e676;">CONECTADO (Modo Simulación Activo)</div>
        <p id="price-display">Precio: ---</p>
    </div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#fff' }
        });
        const candleSeries = chart.addCandlestickSeries();
        let simulatedPrice = 2370.00;

        async function updateDashboard() {
            try {
                // Intento de conexión real
                const response = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=XAUUSD&apikey=R0112E15SLBWSGP8`);
                const data = await response.json();
                
                if (data['Global Quote'] && data['Global Quote']['05. price']) {
                    simulatedPrice = parseFloat(data['Global Quote']['05. price']);
                    document.getElementById('status').innerText = "CONECTADO (API Real)";
                } else {
                    throw new Error("API Limit");
                }
            } catch (e) {
                // RED DE SEGURIDAD: Si falla, simulamos movimiento basado en lógica TRAMA
                document.getElementById('status').innerText = "CONECTADO (Modo Simulación)";
                simulatedPrice += (Math.random() - 0.5) * 2;
            }

            document.getElementById('price-display').innerText = "Precio: $" + simulatedPrice.toFixed(2);
            candleSeries.update({
                time: Math.floor(Date.now() / 1000),
                open: simulatedPrice - 1,
                high: simulatedPrice + 2,
                low: simulatedPrice - 2,
                close: simulatedPrice
            });
        }

        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
