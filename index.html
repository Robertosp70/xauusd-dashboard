<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.0/lightweight-charts.standalone.production.js"></script>
</head>
<body style="background-color: #0c0d14; color: white; margin: 0; padding: 20px;">

    <div id="panel" style="background: #161a25; padding: 20px; border: 1px solid #ff0000; margin-bottom: 20px;">
        <h2 style="color: white; margin: 0;">Sugerencia: COMPRA</h2>
        <p style="margin: 5px 0;">SL: 2340 | TP: 2380</p>
    </div>

    <div id="chart" style="width: 100%; height: 400px; border: 1px solid #00ff00; overflow: hidden;"></div>

    <script>
        window.addEventListener('load', () => {
            // Obtenemos el elemento
            const chartContainer = document.getElementById('chart');
            
            // Creamos el gráfico con dimensiones fijas para evitar el colapso
            const chart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.offsetWidth,
                height: 400,
                layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#d1d4dc' }
            });

            const candleSeries = chart.addCandlestickSeries();
            
            // Datos básicos
            candleSeries.setData([
                { time: '2026-06-10', open: 2340, high: 2350, low: 2330, close: 2345 },
                { time: '2026-06-11', open: 2345, high: 2360, low: 2340, close: 2355 },
                { time: '2026-06-12', open: 2355, high: 2370, low: 2350, close: 2365 }
            ]);

            // Ajuste final
            chart.timeScale().fitContent();
        });
    </script>
</body>
</html>
