<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0c0d14; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; }
        #chart { flex: 3; height: 500px; background: #161a25; border-radius: 8px; border: 1px solid #2a2e39; }
        .sidebar { flex: 1; background: #161a25; padding: 20px; border-radius: 8px; border: 1px solid #2a2e39; }
        .signal-box { background: #00e676; color: #000; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">Dashboard XAUUSD</h1>
    <div class="container">
        <div id="chart"></div>
        <div class="sidebar">
            <h3>Estado: Live</h3>
            <div class="signal-box">COMPRA</div>
            <p><strong>SL:</strong> 2340.50</p>
            <p><strong>TP:</strong> 2380.00</p>
        </div>
    </div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            width: document.getElementById('chart').clientWidth,
            height: 500,
            layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } }
        });

        const candleSeries = chart.addCandlestickSeries();
        
        // Datos con formato completo (Open, High, Low, Close) para ver velas reales
        candleSeries.setData([
            { time: '2026-06-10', open: 2340, high: 2355, low: 2335, close: 2350 },
            { time: '2026-06-11', open: 2350, high: 2365, low: 2345, close: 2360 },
            { time: '2026-06-12', open: 2360, high: 2375, low: 2355, close: 2370 }
        ]);

        chart.timeScale().fitContent();
    </script>
</body>
</html>
