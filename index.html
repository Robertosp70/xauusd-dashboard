<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Dashboard</title>
    <!-- Usamos la versión específica 4.1.0 que es totalmente estable -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0c0d14; color: white; margin: 0; padding: 20px; font-family: sans-serif; }
        #chart { width: 100%; height: 500px; background: #161a25; border: 1px solid #2a2e39; }
    </style>
</head>
<body>
    <h1>XAUUSD Dashboard</h1>
    <div id="chart"></div>

    <script>
        // Esperamos a que la ventana cargue para asegurar que la librería está lista
        window.addEventListener('load', function() {
            try {
                const chart = LightweightCharts.createChart(document.getElementById('chart'), {
                    layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#d1d4dc' }
                });
                
                const candleSeries = chart.addCandlestickSeries();
                
                candleSeries.setData([
                    { time: '2026-06-10', open: 2340, high: 2350, low: 2330, close: 2345 },
                    { time: '2026-06-11', open: 2345, high: 2360, low: 2340, close: 2355 },
                    { time: '2026-06-12', open: 2355, high: 2370, low: 2350, close: 2365 }
                ]);
            } catch (e) {
                console.error("Error al crear el gráfico:", e);
                document.body.innerHTML += "<p style='color:red'>Error: " + e.message + "</p>";
            }
        });
    </script>
</body>
</html>
