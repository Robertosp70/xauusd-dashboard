<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0c0d14; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        #chart { height: 500px; background: #161a25; border-radius: 8px; border: 1px solid #2a2e39; }
        .panel { background: #161a25; padding: 20px; border-radius: 8px; border: 1px solid #2a2e39; }
        .signal-buy { background: #00e676; color: #000; padding: 15px; text-align: center; font-weight: bold; border-radius: 5px; margin: 10px 0; }
        .news-item { font-size: 0.9em; border-bottom: 1px solid #2a2e39; padding: 10px 0; color: #aaa; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">XAUUSD Dashboard Estratégico</h1>
    
    <div class="dashboard-grid">
        <div id="chart"></div>
        
        <div class="panel">
            <h3>Señal Actual</h3>
            <div class="signal-buy">COMPRA FUERTE</div>
            <p>SL: 2340.50 | TP: 2380.00</p>
            
            <h3>Últimas Noticias (Oro)</h3>
            <div id="news-feed">
                <div class="news-item">Fed mantiene tasas, oro reacciona al alza.</div>
                <div class="news-item">Aumenta demanda de refugio en Asia.</div>
            </div>
        </div>
    </div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            width: document.getElementById('chart').clientWidth,
            height: 500,
            layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } }
        });

        // Configuración de series
        const candleSeries = chart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350' });
        
        // Datos extendidos (Simulando una tendencia alcista)
        candleSeries.setData([
            { time: '2026-06-08', open: 2320, high: 2335, low: 2315, close: 2330 },
            { time: '2026-06-09', open: 2330, high: 2345, low: 2325, close: 2340 },
            { time: '2026-06-10', open: 2340, high: 2355, low: 2335, close: 2350 },
            { time: '2026-06-11', open: 2350, high: 2365, low: 2345, close: 2360 },
            { time: '2026-06-12', open: 2360, high: 2380, low: 2355, close: 2370 }
        ]);

        chart.timeScale().fitContent();
    </script>
</body>
</html>
