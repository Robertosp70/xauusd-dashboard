<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Dashboard Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.0/lightweight-charts.standalone.production.js"></script>
    <style>
        /* Corrección de diseño: Usamos flexbox para asegurar que todo quepa */
        body { background-color: #0c0d14; color: white; font-family: sans-serif; display: flex; flex-wrap: wrap; padding: 20px; }
        
        #chart-container { flex: 2; min-width: 600px; }
        #chart { width: 100%; height: 500px; background: #161a25; border: 1px solid #2a2e39; }
        
        .sidebar { flex: 1; min-width: 300px; padding-left: 20px; }
        .signal { font-size: 24px; font-weight: bold; margin: 20px 0; padding: 15px; text-align: center; border-radius: 5px; }
        .buy { background: #00e676; color: black; }
        .sell { background: #ff5252; color: white; }
    </style>
</head>
<body>

    <div id="chart-container">
        <h1>XAUUSD Análisis en Vivo</h1>
        <div id="chart"></div>
    </div>

    <aside class="sidebar">
        <h3>Sugerencia Algorítmica</h3>
        <div id="signal" class="signal">Analizando...</div>
        <div style="background: #161a25; padding: 15px; border: 1px solid #2a2e39;">
            <p>SL: <span id="sl">-</span></p>
            <p>TP: <span id="tp">-</span></p>
        </div>
    </aside>

    <script>
        // Ajustamos la creación del gráfico para que ocupe el 100% del contenedor padre
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#d1d4dc' }
        });

        const candleSeries = chart.addCandlestickSeries();
        const tramaLine = chart.addLineSeries({ color: '#3a76ff', lineWidth: 2 });

        // Datos de prueba
        const data = [
            { time: '2026-06-10', open: 2340, high: 2350, low: 2330, close: 2345 },
            { time: '2026-06-11', open: 2345, high: 2360, low: 2340, close: 2355 },
            { time: '2026-06-12', open: 2355, high: 2370, low: 2350, close: 2365 }
        ];
        
        candleSeries.setData(data);
        tramaLine.setData(data.map(d => ({ time: d.time, value: d.close - 5 })));

        // Forzamos actualización de señales
        document.getElementById('signal').innerText = "COMPRA";
        document.getElementById('signal').className = "signal buy";
        document.getElementById('sl').innerText = "2340.00";
        document.getElementById('tp').innerText = "2380.00";

        chart.timeScale().fitContent();
    </script>
</body>
</html>
