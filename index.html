<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Dashboard</title>
    <!-- Cargamos la versión estable actual -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0c0d14; color: white; margin: 0; padding: 20px; font-family: sans-serif; }
        #chart { width: 100%; height: 500px; background: #161a25; border: 1px solid #2a2e39; }
    </style>
</head>
<body>
    <h1>XAUUSD Dashboard</h1>
    <div id="chart"></div>

    <script>
        // Usamos una sintaxis compatible con la versión 4.x+
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            width: document.getElementById('chart').clientWidth,
            height: 500,
            layout: {
                background: { type: 'solid', color: '#161a25' },
                textColor: '#d1d4dc',
            },
            grid: {
                vertLines: { color: '#2a2e39' },
                horzLines: { color: '#2a2e39' },
            },
        });

        const candleSeries = chart.addCandlestickSeries();
        
        candleSeries.setData([
            { time: '2026-06-10', open: 2340, high: 2350, low: 2330, close: 2345 },
            { time: '2026-06-11', open: 2345, high: 2360, low: 2340, close: 2355 },
            { time: '2026-06-12', open: 2355, high: 2370, low: 2350, close: 2365 }
        ]);

        // Ajustar el tamaño si cambias la ventana
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: document.getElementById('chart').clientWidth });
        });
    </script>
</body>
</html>
    </script>
</body>
</html>
