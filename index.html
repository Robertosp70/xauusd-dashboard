<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0c0d14; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        #chart { height: 500px; background: #161a25; border-radius: 8px; border: 1px solid #2a2e39; }
        .panel { background: #161a25; padding: 20px; border-radius: 8px; border: 1px solid #2a2e39; }
        .price-text { font-size: 2em; color: #f0b90b; font-weight: bold; margin: 10px 0; }
        .news-item { font-size: 0.9em; padding: 10px 0; border-bottom: 1px solid #2a2e39; color: #aaa; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">XAUUSD Dashboard Estratégico</h1>
    <div class="grid">
        <div id="chart"></div>
        <div class="panel">
            <h3>Precio en Vivo</h3>
            <div id="price-live" class="price-text">Cargando...</div>
            <hr style="border: 0; border-top: 1px solid #2a2e39;">
            <h3>Noticias de Oro</h3>
            <div id="news-container">
                <div class="news-item">Monitoreando mercado...</div>
            </div>
        </div>
    </div>

    <script>
        // 1. Configuración del Gráfico
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            width: document.getElementById('chart').clientWidth,
            height: 500,
            layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } }
        });
        const candleSeries = chart.addCandlestickSeries();

        // 2. Integración de API (Alpha Vantage)
        async function updateMarketData() {
            const apiKey = 'R0112E15SLBWSGP8';
            const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=XAUUSD&apikey=${apiKey}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data['Global Quote'] && data['Global Quote']['05. price']) {
                    const price = parseFloat(data['Global Quote']['05. price']);
                    document.getElementById('price-live').innerText = '$' + price.toFixed(2);
                    
                    // Actualizar el gráfico
                    candleSeries.update({
                        time: Math.floor(Date.now() / 1000),
                        open: price - 0.5,
                        high: price + 1,
                        low: price - 1,
                        close: price
                    });
                }
            } catch(e) {
                console.error("Error de conexión:", e);
            }
        }

        // 3. Simulación de flujo de noticias
        function updateNews() {
            const news = [
                "Fed mantiene tasas, el oro busca soporte.",
                "Alta volatilidad en el par XAUUSD detectada.",
                "El dólar se debilita, favoreciendo al metal precioso."
            ];
            const container = document.getElementById('news-container');
            container.innerHTML = news.map(n => `<div class="news-item">• ${n}</div>`).join('');
        }

        // Ejecutar procesos
        updateMarketData();
        updateNews();
        setInterval(updateMarketData, 60000); // Se actualiza cada 1 minuto (límite de la API gratuita)
        chart.timeScale().fitContent();
    </script>
</body>
</html>
