<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Intradía M15 - Final Profesional</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #0c0d14; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; padding: 20px; gap: 20px; }
        #chart { width: 70%; height: 500px; background: #161a25; border-radius: 8px; border: 1px solid #2a2e39; }
        #panel { width: 30%; background: #161a25; padding: 20px; border-radius: 8px; border: 1px solid #2a2e39; }
        .signal-box { padding: 15px; text-align: center; font-weight: bold; font-size: 1.3em; border-radius: 5px; margin-bottom: 15px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; border-bottom: 1px solid #2a2e39; padding-bottom: 5px; }
        .log-entry { padding: 4px 0; font-size: 0.75em; color: #aaa; }
    </style>
</head>
<body>

    <div id="chart"></div>
    <div id="panel">
        <h2>Dashboard M15</h2>
        <div id="signal-display" class="signal-box">INICIANDO...</div>
        
        <div class="data-row"><span>Precio:</span> <b id="price-val">---</b></div>
        <div class="data-row"><span>ATR (Volatilidad):</span> <b id="atr-val">---</b></div>
        <div class="data-row"><span>SL Dinámico:</span> <b id="sl-val">---</b></div>
        <div class="data-row"><span>TP Dinámico:</span> <b id="tp-val">---</b></div>
        <div class="data-row"><span>P/L Acumulado:</span> <b id="pl-val">0.00</b></div>

        <h3>Bitácora (Cierres M15)</h3>
        <div id="signal-log"></div>
    </div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), { layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#fff' } });
        const candleSeries = chart.addCandlestickSeries();
        let priceHistory = [], signalHistory = [], lastCandleTime = 0, totalPL = 0;

        const API_KEY = '9dabd1ea8afb4071bee53ee0552711ed';
        const SYMBOL = 'XAU/USD';

        async function init() {
            const res = await fetch(`https://api.twelvedata.com/time_series?symbol=${SYMBOL}&interval=15min&outputsize=50&apikey=${API_KEY}`);
            const data = await res.json();
            const hist = data.values.reverse().map(i => ({
                time: Math.floor(new Date(i.datetime).getTime() / 1000),
                open: parseFloat(i.open), high: parseFloat(i.high), low: parseFloat(i.low), close: parseFloat(i.close)
            }));
            candleSeries.setData(hist);
            priceHistory = hist.map(c => c.close);
            setInterval(update, 10000);
        }

        async function update() {
            const res = await fetch(`https://api.twelvedata.com/price?symbol=${SYMBOL}&apikey=${API_KEY}`);
            const data = await res.json();
            const price = parseFloat(data.price);
            
            // Gestión de velas dinámicas M15
            const now = new Date();
            const currentM15 = Math.floor(now.getTime() / (15 * 60 * 1000)) * (15 * 60 * 1000);
            const bars = candleSeries.data();
            const lastBar = bars[bars.length - 1];

            if (lastBar && lastBar.time * 1000 === currentM15) {
                candleSeries.update({
                    time: lastBar.time, open: lastBar.open,
                    high: Math.max(lastBar.high, price), low: Math.min(lastBar.low, price),
                    close: price
                });
            } else {
                candleSeries.update({ time: currentM15 / 1000, open: price, high: price, low: price, close: price });
            }

            // Lógica de estrategia
            priceHistory.push(price);
            if(priceHistory.length > 20) priceHistory.shift();
            const trama = priceHistory.reduce((a,b) => a+b, 0) / priceHistory.length;
            const atr = Math.abs(price - (priceHistory[priceHistory.length-2] || price)) * 2;
            const isBullish = price > trama;
            
            // UI y Bitácora
            document.getElementById('signal-display').innerText = isBullish ? "COMPRA" : "VENTA";
            document.getElementById('signal-display').style.backgroundColor = isBullish ? "#00e676" : "#ff5252";
            document.getElementById('price-val').innerText = "$" + price.toFixed(2);
            document.getElementById('atr-val').innerText = atr.toFixed(2);
            document.getElementById('sl-val').innerText = (isBullish ? price - (atr*1.5) : price + (atr*1.5)).toFixed(2);
            document.getElementById('tp-val').innerText = (isBullish ? price + (atr*3) : price - (atr*3)).toFixed(2);

            if (currentM15 !== lastCandleTime) {
                lastCandleTime = currentM15;
                if(signalHistory.length > 0) totalPL += (isBullish ? (price - signalHistory[0].price) : (signalHistory[0].price - price));
                signalHistory.unshift({time: new Date().toLocaleTimeString(), type: isBullish ? "COMPRA" : "VENTA", price});
                if(signalHistory.length > 5) signalHistory.pop();
                document.getElementById('signal-log').innerHTML = signalHistory.map(e => `<div class="log-entry">${e.time} | ${e.type} @ ${e.price.toFixed(2)}</div>`).join('');
                document.getElementById('pl-val').innerText = totalPL.toFixed(2);
            }
        }
        init();
    </script>
</body>
</html>
