<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Dashboard</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div id="chart" style="width: 100%; height: 500px;"></div>

    <script>
        // Verificamos si la librería cargó correctamente
        if (typeof LightweightCharts === 'undefined') {
            document.body.innerHTML = "<h1>Error: La librería no cargó.</h1>";
        } else {
            const chartOptions = { 
                layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#d1d4dc' },
                width: window.innerWidth - 40,
                height: 500
            };
            
            const chart = LightweightCharts.createChart(document.getElementById('chart'), chartOptions);
            
            // Acceso directo a la función de serie de velas
            const candleSeries = chart.addCandlestickSeries();
            
            candleSeries.setData([
                { time: '2026-06-10', open: 2340, high: 2350, low: 2330, close: 2345 },
                { time: '2026-06-11', open: 2345, high: 2360, low: 2340, close: 2355 },
                { time: '2026-06-12', open: 2355, high: 2370, low: 2350, close: 2365 }
            ]);
        }
    </script>
</body>
</html>
