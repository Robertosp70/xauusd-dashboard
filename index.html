<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Dashboard</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <h1>Verificación de Diagnóstico</h1>
    <div id="chart" style="width: 100%; height: 500px; border: 1px solid red;"></div>

    <script>
        window.addEventListener('load', () => {
            const chart = LightweightCharts.createChart(document.getElementById('chart'), {
                width: 600, height: 400
            });
            
            // DIAGNÓSTICO: Vamos a ver qué contiene realmente el objeto chart
            console.log("Contenido del objeto chart:", Object.keys(chart));
            
            // Intentamos acceder de forma distinta
            if (typeof chart.addCandlestickSeries === 'function') {
                const candleSeries = chart.addCandlestickSeries();
                candleSeries.setData([
                    { time: '2026-06-10', open: 2340, high: 2350, low: 2330, close: 2345 },
                    { time: '2026-06-11', open: 2345, high: 2360, low: 2340, close: 2355 }
                ]);
            } else {
                document.body.innerHTML += "<h2 style='color:red'>El objeto chart existe, pero NO tiene la función addCandlestickSeries.</h2>";
            }
        });
    </script>
</body>
</html>
