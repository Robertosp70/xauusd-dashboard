<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Dashboard Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.0/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0c0d14; color: white; margin: 0; padding: 20px; font-family: sans-serif; }
        #chart { width: 100%; height: 500px; background: #161a25; border: 1px solid #2a2e39; }
    </style>
</head>
<body>
    <h1 style="color: #f0b90b;">XAUUSD Dashboard Pro</h1>
    <div id="chart"></div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            width: 800, height: 500,
            layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } }
        });

        const candleSeries = chart.addCandlestickSeries();

        // Datos simulados de velas para el XAUUSD (Oro)
        const data = [
            { time: '2026-06-01', open: 2320, high: 2340, low: 2315, close: 2335 },
            { time: '2026-06-05', open: 2335, high: 2355, low: 2330, close: 2350 },
            { time: '2026-06-10', open: 2350, high: 2370, low: 2345, close: 2365 },
            { time: '2026-06-13', open: 2365, high: 2380, low: 2355, close: 2375 }
        ];
        
        candleSeries.setData(data);
        
        // Ajuste automático de escala para que se vea bien
        chart.timeScale().fitContent();
    </script>
</body>
</html>
