<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0c0d14; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        #chart { height: 500px; background: #161a25; border-radius: 8px; border: 1px solid #2a2e39; }
        .panel { background: #161a25; padding: 20px; border-radius: 8px; border: 1px solid #2a2e39; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">XAUUSD LIVE FEED</h1>
    <div class="dashboard">
        <div id="chart"></div>
        <div class="panel">
            <h3>Estado del Sistema</h3>
            <div id="status" style="color: #00e676;">Conectado a Live Feed...</div>
            <p>El gráfico se actualizará automáticamente cada 5 segundos.</p>
        </div>
    </div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            width: document.getElementById('chart').clientWidth,
            height: 500,
            layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#d1d4dc' }
        });

        const candleSeries = chart.addCandlestickSeries();

        // Datos iniciales
        candleSeries.setData([
            { time: '2026-06-12', open: 2360, high: 2380, low: 2355, close: 2370 }
        ]);

        // Simulación de datos en vivo (Aquí conectarías a un WebSocket real)
        setInterval(() => {
            const lastData = {
                time: Math.floor(Date.now() / 1000),
                open: 2370,
                high: 2375 + Math.random(),
                low: 2365 - Math.random(),
                close: 2370 + (Math.random() - 0.5) * 5
            };
            candleSeries.update(lastData);
        }, 5000);

        chart.timeScale().fitContent();
    </script>
</body>
</html>
