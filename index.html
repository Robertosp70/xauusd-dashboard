<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Dashboard Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.0/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0c0d14; color: white; font-family: sans-serif; display: flex; flex-direction: column; padding: 20px; }
        .wrapper { display: flex; gap: 20px; width: 100%; }
        #chart { flex: 2; height: 500px; background: #161a25; border: 1px solid #2a2e39; }
        .sidebar { flex: 1; background: #161a25; padding: 20px; border: 1px solid #2a2e39; border-radius: 8px; }
        .signal { font-size: 24px; font-weight: bold; margin: 20px 0; padding: 15px; text-align: center; border-radius: 5px; }
        .buy { background: #00e676; color: black; }
    </style>
</head>
<body>

    <h1>XAUUSD Análisis en Vivo</h1>
    <div class="wrapper">
        <div id="chart"></div>
        <aside class="sidebar">
            <h3>Sugerencia Algorítmica</h3>
            <div id="signal" class="signal buy">COMPRA</div>
            <p>SL: <span id="sl">2340.00</span></p>
            <p>TP: <span id="tp">2380.00</span></p>
        </aside>
    </div>

    <script>
        // ESTA ES LA CLAVE: Esperamos a que la ventana esté lista
        window.addEventListener('load', function() {
            if (typeof LightweightCharts !== 'undefined') {
                const chart = LightweightCharts.createChart(document.getElementById('chart'), {
                    width: document.getElementById('chart').clientWidth,
                    height: 500,
                    layout: { background: { type: 'solid', color: '#161a25' }, textColor: '#d1d4dc' }
                });

                const candleSeries = chart.addCandlestickSeries();
                candleSeries.setData([
                    { time: '2026-06-10', open: 2340, high: 2350, low: 2330, close: 2345 },
                    { time: '2026-06-11', open: 2345, high: 2360, low: 2340, close: 2355 },
                    { time: '2026-06-12', open: 2355, high: 2370, low: 2350, close: 2365 }
                ]);
                chart.timeScale().fitContent();
            } else {
                console.error("La librería sigue sin cargar.");
            }
        });
    </script>
</body>
</html>
